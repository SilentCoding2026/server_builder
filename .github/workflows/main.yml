name: Minecraft Server Builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  builder:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y p7zip-full jq screen
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install python deps
        run: pip install flask py7zr psutil requests

      - name: Prepare dirs
        run: mkdir -p server uploads

      - name: Start File Browser
        run: |
          filebrowser --root ./server --port 8081 --address 0.0.0.0 --noauth &
          sleep 2

      - name: Start Admin Panel
        run: |
          python builder/panel.py &
          sleep 2

      - name: Expose Panel
        run: |
          cloudflared tunnel --url http://localhost:8000 &
          sleep 6

      - name: Expose FileBrowser
        run: |
          cloudflared tunnel --url http://localhost:8081 &
          sleep 6

      - name: Wait for Build
        run: |
          echo "Panel is running. Press BUILD button to continue."
          while [ ! -f .build_triggered ]; do
            sleep 5
          done
          echo "Build triggered! Proceeding..."

      - name: Pull latest
        run: git pull

      - name: Run Minecraft Server
        run: |
          JAR=$(ls server/*.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "No jar found in server/"
            exit 1
          fi
          echo "Starting server with: $JAR"
          screen -dmS mc java -Xmx6G -Xms6G -jar "$JAR" nogui
          sleep infinity

      - name: Stop & backup
        if: always()
        run: |
          screen -S mc -X stuff "stop$(printf \\r)" || true
          sleep 15
          rm -f server_backup.7z*
          7z a server_backup.7z server
          7z a server_backup.7z.part server_backup.7z -v95m
          gh release delete latest --yes || true
          gh release create latest server_backup.7z.part*
